name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hacs-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: hassfest validation
        uses: home-assistant/actions/hassfest@master
