name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy JS into integration www/ folder
        run: cp dist/navbar-card.js custom_components/navbar/www/navbar-card.js

      - name: Commit www/navbar-card.js back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/navbar/www/navbar-card.js
          git diff --staged --quiet || git commit -m "chore: update navbar-card.js for $(git describe --tags)"
          git push origin HEAD:main || true

      - name: Copy to root for HACS release asset
        run: cp dist/navbar-card.js navbar-card.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: navbar-card.js
          generate_release_notes: true
