name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Get tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update manifest.json version
        run: |
          python3 -c "
          import json
          with open('custom_components/navbar/manifest.json') as f:
              m = json.load(f)
          m['version'] = '${{ steps.version.outputs.VERSION }}'
          with open('custom_components/navbar/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
              f.write('\n')
          print('manifest.json version updated to', m['version'])
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy JS into integration www/ folder
        run: cp dist/navbar-card.js custom_components/navbar/www/navbar-card.js

      - name: Commit manifest.json version back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/navbar/manifest.json
          git diff --staged --quiet || git commit -m "chore: bump manifest version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main || true

      - name: Copy to root for HACS release asset
        run: cp dist/navbar-card.js navbar-card.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: navbar-card.js
          generate_release_notes: true
