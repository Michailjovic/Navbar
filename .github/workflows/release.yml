name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy dist to root for HACS
        run: cp dist/navbar-card.js navbar-card.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: navbar-card.js
          generate_release_notes: true
