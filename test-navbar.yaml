type: custom:navbar-card
config_id: default

tiles:
  - name: Ložnice
    entity: light.light_group_bedroom
    background_image: /local/Dashboards/Rooms/Bedroom-svetlo-off.webp
    overlay_image: /local/Dashboards/Rooms/Bedroom-overlay-SVETlo.webp
    filter_on: "brightness(2.6) sepia(0.35) saturate(0.9)"
    filter_off: "brightness(0.6) saturate(1.0)"
    transition: 2.0
    sensors:
      - entity: sensor.aqd_bedroom_temperature
        position: top-left
      - entity: sensor.aqd_bedroom_humidity
        position: bottom-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-home/bedroom
    hold_action:
      action: navigate
      navigation_path: /dashboard-various/thermostat
    double_tap_action:
      action: popup
      popup:
        title: "🛏️ Ložnice – vzduch & topení"
        size: normal
        content:
          - type: custom:mushroom-climate-card
            entity: climate.versatile_bedroom
            name: Topení – Ložnice
            icon: mdi:radiator
            show_temperature_control: true
            hvac_modes:
              - heat
              - "off"
          - type: custom:air-comfort-card
            temperature_entity: sensor.aqd_bedroom_temperature
            humidity_entity: sensor.aqd_bedroom_humidity
            co2_entity: sensor.aqd_bedroom_carbon_dioxide
            pm25_entity: sensor.aqd_bedroom_pm2_5
            pm10_entity: sensor.aqd_bedroom_pm10
            voc_entity: sensor.aqd_bedroom_hcho
            temperature_unit: C
            temp_c_min: 17
            temp_c_max: 22
            humidity_min: 40
            humidity_max: 60
            name: Bedroom

  - name: Kuchyň
    entity: light.kitchen_group
    background_image: /local/Dashboards/Rooms/Kitchen.webp
    filter_on: "brightness(1.60) sepia(0.47) saturate(3.0) hue-rotate(175deg)"
    filter_off: "brightness(0.50) sepia(0.3) saturate(1.8) hue-rotate(-10deg)"
    transition: 1.5
    sensors:
      - entity: sensor.aqd_kitchen_temperature
        position: top-left
      - entity: sensor.aqd_kitchen_humidity
        position: bottom-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-home/kitchen
    hold_action:
      action: navigate
      navigation_path: /dashboard-various/thermostat
    double_tap_action:
      action: popup
      popup:
        title: "🍳 Kuchyň – vzduch & topení"
        size: normal
        content:
          - type: custom:mushroom-climate-card
            entity: climate.versatile_kitchen
            name: Topení – Kuchyň
            icon: mdi:radiator
            show_temperature_control: true
            hvac_modes:
              - heat
              - "off"
          - type: custom:air-comfort-card
            temperature_entity: sensor.aqd_kitchen_temperature
            humidity_entity: sensor.aqd_kitchen_humidity
            co2_entity: sensor.aqd_kitchen_carbon_dioxide
            pm25_entity: sensor.aqd_kitchen_pm2_5
            pm10_entity: sensor.aqd_kitchen_pm10
            voc_entity: sensor.aqd_kitchen_hcho
            temperature_unit: C
            temp_c_min: 17
            temp_c_max: 22
            humidity_min: 40
            humidity_max: 60
            name: Kuchyň

  - name: Chodba
    entity: light.panel_hall
    background_image: /local/Dashboards/Rooms/Hall.webp
    filter_on: "brightness(1.70) sepia(0.57) saturate(2.5) hue-rotate(175deg)"
    filter_off: "brightness(0.6) saturate(0.9)"
    transition: 1.0
    sensors:
      - entity: sensor.aqd_hall_temperature
        position: top-left
      - entity: sensor.aqd_hall_humidity
        position: bottom-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-home/hall
    double_tap_action:
      action: popup
      popup:
        title: "🚪 Chodba – vzduch"
        size: normal
        content:
          - type: custom:air-comfort-card
            temperature_entity: sensor.aqd_hall_temperature
            humidity_entity: sensor.aqd_hall_humidity
            co2_entity: sensor.aqd_hall_carbon_dioxide
            pm25_entity: sensor.aqd_hall_pm2_5
            pm10_entity: sensor.aqd_hall_pm10
            voc_entity: sensor.aqd_hall_hcho
            temperature_unit: C
            temp_c_min: 17
            temp_c_max: 22
            humidity_min: 40
            humidity_max: 60
            name: Chodba

  - name: Koupelna
    entity: light.panel_bathroom
    background_image: /local/Dashboards/Rooms/Bathroom.webp
    filter_on: "brightness(2.00) sepia(0.35) saturate(1.5) hue-rotate(185deg)"
    filter_off: "brightness(0.75) sepia(0.10) saturate(0.9)"
    transition: 1.5
    sensors:
      - entity: sensor.aqd_bathroom_temperature
        position: top-left
      - entity: sensor.aqd_bathroom_humidity
        position: bottom-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-home/bathroom
    double_tap_action:
      action: popup
      popup:
        title: "🚿 Koupelna – vzduch"
        size: normal
        content:
          - type: custom:air-comfort-card
            temperature_entity: sensor.aqd_bathroom_temperature
            humidity_entity: sensor.aqd_bathroom_humidity
            co2_entity: sensor.aqd_bathroom_carbon_dioxide
            pm25_entity: sensor.aqd_bathroom_pm2_5
            pm10_entity: sensor.aqd_bathroom_pm10
            voc_entity: sensor.aqd_bathroom_hcho
            temperature_unit: C
            temp_c_min: 17
            temp_c_max: 22
            humidity_min: 40
            humidity_max: 60
            name: Koupelna

  - name: Obývák
    entity: light.light_group_living_room
    background_image: /local/living room-night.png
    overlay_image: /local/living room-light.png
    filter_on: "brightness(1.3) saturate(1.2)"
    filter_off: "brightness(0.55) saturate(0.9)"
    transition: 1.5
    sensors:
      - entity: sensor.aqd_living_room_temperature
        position: top-left
      - entity: sensor.aqd_living_room_humidity
        position: bottom-left
    tap_action:
      action: navigate
      navigation_path: /dashboard-home/living-room
    hold_action:
      action: navigate
      navigation_path: /dashboard-various/thermostat
    double_tap_action:
      action: popup
      popup:
        title: "🛋️ Obývák – vzduch & topení"
        size: normal
        content:
          - type: custom:mushroom-climate-card
            entity: climate.versatile_living_room
            name: Topení – Obývák
            icon: mdi:radiator
            show_temperature_control: true
            hvac_modes:
              - heat
              - "off"
          - type: custom:air-comfort-card
            temperature_entity: sensor.aqd_living_room_temperature
            humidity_entity: sensor.aqd_living_room_humidity
            co2_entity: sensor.aqd_living_room_carbon_dioxide
            pm25_entity: sensor.aqd_living_room_pm2_5
            pm10_entity: sensor.aqd_living_room_pm10
            voc_entity: sensor.aqd_living_room_hcho
            temperature_unit: C
            temp_c_min: 17
            temp_c_max: 22
            humidity_min: 40
            humidity_max: 60
            name: Obývák

slots:
  bottom:
    - type: custom:alert-ticker-card
      cycle_interval: 20
      show_when_clear: true
      clear_message: Vše v pořádku
      clear_theme: success
      cycle_animation: slide
      card_height: 83
      swipe_to_snooze: true
      alerts:
        - entity: input_boolean.humidity_alert_bathroom
          operator: "=="
          state: "on"
          message: "Zvýšená vlhkost v koupelně – {{ states('sensor.aqd_bathroom_humidity') }}%"
          priority: 1
          theme: leak
          icon: 💧
          show_badge: false
          tap_action:
            action: more-info
            entity_id: humidifier.nwt_dehumidifier
          hold_action:
            action: navigate
            navigation_path: /dashboard-various/Dehum
        - entity: input_boolean.humidity_alert_living_room
          operator: "=="
          state: "on"
          message: "Zvýšená vlhkost v obýváku – {{ states('sensor.aqd_living_room_humidity') }}%"
          priority: 1
          theme: leak
          icon: 💧
          show_badge: false
          tap_action:
            action: more-info
            entity_id: humidifier.dehumidifier_pasapair
          hold_action:
            action: navigate
            navigation_path: /dashboard-various/Dehum
        - entity: input_boolean.humidity_alert_bedroom
          operator: "=="
          state: "on"
          message: "Zvýšená vlhkost v ložnici – {{ states('sensor.aqd_bedroom_humidity') }}%"
          priority: 1
          theme: leak
          icon: 💧
          show_badge: false
          tap_action:
            action: more-info
            entity_id: humidifier.wdh_214us
          hold_action:
            action: navigate
            navigation_path: /dashboard-various/Dehum
        - entity: humidifier.nwt_dehumidifier
          operator: "=="
          state: "on"
          message: "Vysoušeč Koupelna – {{ states('sensor.aqd_bathroom_humidity') }}%"
          priority: 1
          theme: update
          icon: mdi:fan
          show_badge: false
          tap_action:
            action: more-info
            entity_id: humidifier.nwt_dehumidifier
          secondary_text: "WDH {{ state_attr('humidifier.nwt_dehumidifier', 'current_humidity') }}% - {{ states('sensor.plug_shelly_dehumidifier_bathroom_power') }} W"
          hold_action:
            action: navigate
            navigation_path: /dashboard-various/Dehum
          use_ha_icon: true
          icon_color: cyan
        - entity: humidifier.dehumidifier_pasapair
          operator: "=="
          state: "on"
          message: "Vysoušeč Obývák – {{ states('sensor.aqd_living_room_humidity') }}%"
          priority: 1
          theme: update
          icon: mdi:fan
          show_badge: false
          tap_action:
            action: more-info
            entity_id: humidifier.dehumidifier_pasapair
          secondary_text: "WDH {{ state_attr('humidifier.dehumidifier_pasapair', 'current_humidity') }}% - {{ states('sensor.power_strip_pc_power_4') }} W"
          hold_action:
            action: navigate
            navigation_path: /dashboard-various/Dehum
          use_ha_icon: true
          icon_color: cyan
        - entity: humidifier.wdh_214us
          operator: "=="
          state: "on"
          message: "Vysoušeč Ložnice – {{ states('sensor.aqd_bedroom_humidity') }}%"
          priority: 1
          theme: update
          icon: mdi:fan
          show_badge: false
          tap_action:
            action: more-info
            entity_id: humidifier.wdh_214us
          secondary_text: "WDH {{ state_attr('humidifier.wdh_214us', 'current_humidity') }}% - {{ states('sensor.plug_shelly_dehumidifier_bedroom_power') }} W"
          hold_action:
            action: navigate
            navigation_path: /dashboard-various/Dehum
          use_ha_icon: true
          icon_color: cyan
        - entity: sensor.bosch_washerdryer_operation_state
          operator: "=="
          state: run
          message: >-
            Pračka běží – {% set h = states('sensor.bosch_washerdryer_finish_in') | float(0) %}
            {% set m = (h * 60) | round(0) | int %}
            {% if m > 60 %}{{ (m // 60) }}h {{ m % 60 }}min{% else %}{{ m }} min{% endif %}
          priority: 3
          theme: info
          icon: 🫧
          tap_action:
            action: navigate
            navigation_path: /dashboard-various/washerdryer
          show_badge: false
        - entity: sensor.bosch_mycka_operation_state
          operator: "=="
          state: BSH.Common.EnumType.OperationState.Run
          message: >-
            Myčka běží – {% set end = states('sensor.bosch_mycka_remaining_program_time') %}
            {% if end and end != 'unknown' %}
            {% set m = [((as_datetime(end).timestamp() - now().timestamp()) / 60) | round(0) | int, 0] | max %}
            {% if m > 60 %}{{ (m // 60) }}h {{ m % 60 }}min{% else %}{{ m }} min{% endif %}
            {% else %}--{% endif %}
          priority: 3
          theme: info
          icon: 🍽️
          tap_action:
            action: navigate
            navigation_path: /dashboard-various/dishwasher
          show_badge: false
        - entity: sensor.bosch_oven_operation_state
          operator: "=="
          state: BSH.Common.EnumType.OperationState.Run
          message: >-
            Trouba běží – {% set end = states('sensor.bosch_oven_remaining_program_time') %}
            {% if end and end != 'unknown' %}
            {% set m = [((as_datetime(end).timestamp() - now().timestamp()) / 60) | round(0) | int, 0] | max %}
            {% if m > 60 %}{{ (m // 60) }}h {{ m % 60 }}min{% else %}{{ m }} min{% endif %}
            {% else %}--{% endif %}
          priority: 2
          theme: warning
          icon: 🔥
          tap_action:
            action: navigate
            navigation_path: /dashboard-various/Oven
          show_badge: false
        - entity: binary_sensor.ariston_is_heating
          operator: "=="
          state: "on"
          message: "Bojler nahřívá – {{ state_attr('water_heater.bojler', 'current_temperature') }}°C → {{ state_attr('water_heater.bojler', 'temperature') }}°C"
          secondary_text: >-
            {% set ready = states('sensor.bojler_ready_time') %}
            {% if ready not in ('unavailable', 'unknown', '') %}
            Hotovo v {{ (ready | as_datetime | as_local).strftime('%H:%M') }}
            {% endif %}
          priority: 1
          theme: warning
          icon: 🌡️
          show_badge: false
          tap_action:
            action: more-info
            entity_id: water_heater.bojler
        - entity: switch.hdo
          operator: "=="
          state: "on"
          message: "Nízký tarif (NT) – změna v {{ (states('sensor.hdo_next_change_dt') | as_datetime | as_local).strftime('%H:%M') }}"
          priority: 4
          theme: success
          icon: 🌿
          tap_action:
            action: navigate
            navigation_path: /dashboard-various/HDO
          show_badge: false
        - entity: switch.hdo
          operator: "=="
          state: "off"
          message: "Vysoký tarif (VT) – změna v {{ (states('sensor.hdo_next_change_dt') | as_datetime | as_local).strftime('%H:%M') }}"
          priority: 1
          theme: emergency
          icon: ⚡
          tap_action:
            action: navigate
            navigation_path: /dashboard-various/HDO
          show_badge: false
        - entity: sensor.odpad_nejblizsi_dnu
          operator: "=="
          state: "0"
          message: Dnes svoz odpadu!
          secondary_text: "{{ states('sensor.papir').split(' - ')[0] }}"
          priority: 1
          theme: caution
          icon: 🗑️
          tap_action:
            action: more-info
            entity_id: sensor.papir
          show_badge: false
        - entity: sensor.odpad_nejblizsi_dnu
          operator: "=="
          state: "1"
          message: Zítra svoz odpadu
          secondary_text: "{{ states('sensor.papir').split(' - ')[0] }}"
          priority: 3
          theme: info
          icon: 🗑️
          tap_action:
            action: more-info
            entity_id: sensor.papir
          show_badge: false
